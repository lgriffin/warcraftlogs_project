name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Codespell
        run: codespell warcraftlogs_client/ tests/
      - name: Vulture dead code check
        continue-on-error: true
        run: vulture warcraftlogs_client/ vulture_whitelist.py --min-confidence 80 --exclude warcraftlogs_client/gui/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
      - name: Run mypy
        continue-on-error: true
        run: mypy warcraftlogs_client/ --exclude 'gui/'

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
      - name: Run bandit
        run: bandit -c pyproject.toml -r warcraftlogs_client/
      - name: pip-audit
        continue-on-error: true
        run: pip-audit --strict --desc on

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
      - name: Radon cyclomatic complexity
        continue-on-error: true
        run: radon cc warcraftlogs_client/ -a -nc --exclude "gui/*"
      - name: Radon maintainability index
        continue-on-error: true
        run: radon mi warcraftlogs_client/ -nc --exclude "gui/*"
