name: Build Windows Installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "PySide6>=6.6.0"
          pip install pyinstaller Pillow

      - name: Convert icon
        run: python -c "from PIL import Image; Image.open('logo.png').save('logo.ico')"

      - name: Build with PyInstaller
        run: pyinstaller warcraftlogs_analyzer.spec

      - name: Build installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer.iss

      - name: Generate SHA256 checksums
        run: |
          cd installer_output
          sha256sum *.exe > SHA256SUMS.txt
        shell: bash

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarcraftLogsAnalyzer-Installer
          path: |
            installer_output/*.exe
            installer_output/SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/*.exe
            installer_output/SHA256SUMS.txt
          generate_release_notes: true
